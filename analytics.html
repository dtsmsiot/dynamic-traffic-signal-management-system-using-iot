<!DOCTYPE html>
<html>
<head>
<title>Traffic Analytics</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">
<h2>Traffic Management System</h2>
<a href="index.html">Overview</a>
<a href="analytics.html">Analytics</a>
<a href="report.html">Traffic Report</a>
<a href="approve.html">Approve Police</a>
<a href="emergency_dashboard.html">Emergency Dashboard</a>
<a href="login.html">Logout</a>
</div>

<div class="main">

<div class="header-bar">
<h1>🚦 Dynamic Traffic Signal Management System</h1>
<div class="header-info">
<span id="dateTime"></span>
<span>City: Nashik</span>
</div>
</div>

<h2>Traffic Analytics</h2>

<div class="cards">

<div class="card">
<h3>Peak Lane</h3>
<div class="value" id="peak">Loading...</div>
</div>

<div class="card">
<h3>Traffic Load</h3>
<div class="value yellow" id="load">Loading...</div>
</div>

</div>

<br><br>

<div class="card">
<h3>📊 Traffic Flow Graph</h3>
<canvas id="trafficChart"></canvas>
</div>

<br><br>

<div class="card">
<h3>🚑 Emergency Vehicle Detection</h3>
<p id="emergencyStatus">Checking...</p>
</div>

</div>

<script>


const ESP_IP = "http://10.228.178.72";

setInterval(()=>{
 document.getElementById("dateTime")
 .innerHTML=new Date().toLocaleString();
},1000);


const ctx=document.getElementById('trafficChart');

const chart=new Chart(ctx,{
 type:'line',
 data:{
   labels:[],
   datasets:[{
     label:'Traffic Density',
     data:[],
     fill:false,
     tension:0.3
   }]
 }
});

async function loadTraffic()
{
 try{

   let res=await fetch(`${ESP_IP}/traffic`);
   let data=await res.json();

   let lanes=data.lane;

   let activeLane=-1;
   let emergency=false;

   for(let i=0;i<lanes.length;i++)
   {
      if(lanes[i]=="GREEN")
         activeLane=i;

      if(lanes[i]=="EMERGENCY")
         emergency=true;
   }


   if(activeLane!=-1)
     document.getElementById("peak")
       .innerHTML="Lane "+(activeLane+1);

   let load="Low";

   if(activeLane==0 || activeLane==1)
       load="Medium";

   if(emergency)
       load="High";

   document.getElementById("load").innerHTML=load;

   document.getElementById("emergencyStatus")
     .innerHTML =
     emergency ?
     " Emergency Vehicle Active" :
     "No Emergency Detected";

   let time=new Date().toLocaleTimeString();

   chart.data.labels.push(time);
   chart.data.datasets[0].data.push(activeLane+1);

   if(chart.data.labels.length>10)
   {
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
   }

   chart.update();

 }
 catch{
   console.log("ESP32 Offline");
 }

}


setInterval(loadTraffic,2000);

</script>

</body>
</html>
