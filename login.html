<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Traffic Signal System</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
  <div class="login-box">
    <div class="traffic-light">
      <div class="light red"></div>
      <div class="light yellow"></div>
      <div class="light green"></div>
    </div>

    <h2 class="main">Dynamic Traffic Signal Management System</h2>
    <p class="subtitle">Login to Dashboard</p>

    <form onsubmit="return validateLogin()">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>

      
      <div class="show-pass">
        <input type="checkbox" id="showPassword" onclick="togglePassword()">
        <label for="showPassword">Show Password</label>
      </div>

      <div class="input-group">
        <label>User Role</label>
        <select id="role" required>
          <option value="">Select Role</option>
          <option value="admin">Admin</option>
          <option value="police">Traffic Police</option>
          <option value="emergency">Emergency Vehicle</option>
        </select>
      </div>

      <button type="submit">Login</button>

      <p>
        New Traffic Police Officer Registration?
        <a href="signup.html">Register Here</a>
      </p>

      
      <p>
        New Traffic Emergency Vehicle Registration?
        <a href="signupemergency.html">Register Here</a>
      </p>

      <p id="error"></p>
    </form>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
