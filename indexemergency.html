<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Traffic Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>Traffic Management System</h2>
    <a href="indexemergency.html">Overview</a>
     <a href="emergency_dashboard_emergency.html">Emergency Vehicle Control Dashboard</a>
    <a href="login.html">Logout</a>
</div>

<div class="main">

    <div class="header-bar">
        <h1>🚦 Dynamic Traffic Signal Management System</h1>
        <div class="header-info">
            <span id="dateTime"></span>
            <span> | City: Nashik</span>
             <span id="userInfo" style="margin-left:20px; font-weight:bold;"></span>
        </div>
    </div>

    <div class="header">Traffic Overview</div>


    <div class="dashboard">
        <div class="lane-card">
            <div class="lane-title">Lane 1</div>
            <div id="lane1-text" class="status red">RED</div>
            <div class="traffic-light">
                <div class="light red" id="lane1-red"></div>
                <div class="light yellow" id="lane1-yellow"></div>
                <div class="light green" id="lane1-green"></div>
            </div>
        </div>

        
        <div class="lane-card">
            <div class="lane-title">Lane 2</div>
            <div id="lane2-text" class="status red">RED</div>
            <div class="traffic-light">
                <div class="light red" id="lane2-red"></div>
                <div class="light yellow" id="lane2-yellow"></div>
                <div class="light green" id="lane2-green"></div>
            </div>
        </div>

        
        <div class="lane-card">
            <div class="lane-title">Lane 3</div>
            <div id="lane3-text" class="status red">RED</div>
            <div class="traffic-light">
                <div class="light red" id="lane3-red"></div>
                <div class="light yellow" id="lane3-yellow"></div>
                <div class="light green" id="lane3-green"></div>
            </div>
        </div>

        
        <div class="lane-card">
            <div class="lane-title">Lane 4</div>
            <div id="lane4-text" class="status red">RED</div>
            <div class="traffic-light">
                <div class="light red" id="lane4-red"></div>
                <div class="light yellow" id="lane4-yellow"></div>
                <div class="light green" id="lane4-green"></div>
            </div>
        </div>
    </div>
</div>


<script>
const ARDUINO_IP = "10.228.178.72"; // Replace with your ESP32 IP
const ARDUINO_URL = `http://${ARDUINO_IP}/traffic`;

async function updateDashboard() {
    try {
        const res = await fetch(ARDUINO_URL);
        const data = await res.json(); 

        data.lane.forEach((state, i) => {
            const laneNum = i+1;
            const lower = state.toLowerCase();


            const textEl = document.getElementById(`lane${laneNum}-text`);
            textEl.innerText = state;
            textEl.classList.remove("red","yellow","green");
            textEl.classList.add(lower);

  
            ["red","yellow","green"].forEach(color=>{
                const lightEl = document.getElementById(`lane${laneNum}-${color}`);
                if(color===lower) lightEl.classList.add("active");
                else lightEl.classList.remove("active");
            });
        });

    } catch(err) {
        console.error("Cannot fetch data", err);
    }
}

setInterval(updateDashboard, 1000);
updateDashboard();


function updateDateTime() {
    document.getElementById("dateTime").innerText = new Date().toLocaleString();
}
setInterval(updateDateTime, 1000);
updateDateTime();

function displayUser() {
    const user = JSON.parse(localStorage.getItem("currentUser"));

    if(user){
        document.getElementById("userInfo").innerHTML =
            " | 👤 " + user.name + " (" + user.role.toUpperCase() + ")";
    } else {
        window.location.href = "login.html";
    }
}

displayUser();

</script>

</body>
</html>
