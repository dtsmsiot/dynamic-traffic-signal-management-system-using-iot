<!DOCTYPE html>
<html>
<head>
    <title>Emergency Vehicle Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>Traffic Management System</h2>
    <a href="index.html">Overview</a>
    <a href="analytics.html">Analytics</a>
    <a href="report.html">Traffic Report</a>
    <a href="approve.html" class="admin-only">Approve Police</a>
    <a href="emergency_dashboard.html" class="admin-only">Emergency Dashboard</a>
    <a href="login.html">Logout</a>
</div>


<div class="main">

    <div class="header-bar">
        <h1>🚦 Dynamic Traffic Signal Management System</h1>
        <div class="header-info">
            <span id="dateTime"></span>
            <span> | City: Nashik</span>
        </div>
    </div>

    <div class="header">Emergency Vehicle Control</div>

    <div class="dashboard">

        <div class="lane-card">
            <div class="lane-title">Lane 1</div>
            <button class="status red" id="btn0" onclick="sendEmergency(0)">
                Activate
            </button>
        </div>

        <div class="lane-card">
            <div class="lane-title">Lane 2</div>
            <button class="status red" id="btn1" onclick="sendEmergency(1)">
                Activate
            </button>
        </div>

        <div class="lane-card">
            <div class="lane-title">Lane 3</div>
            <button class="status red" id="btn2" onclick="sendEmergency(2)">
                Activate
            </button>
        </div>

        <div class="lane-card">
            <div class="lane-title">Lane 4</div>
            <button class="status red" id="btn3" onclick="sendEmergency(3)">
                Activate
            </button>
        </div>

    </div>

    <div style="margin-top:30px; font-size:18px; font-weight:bold;" id="status">
        System Ready
    </div>

</div>

<script>


function updateDateTime(){
    const now = new Date();
    document.getElementById("dateTime").innerHTML =
        now.toLocaleDateString() + ", " + now.toLocaleTimeString();
}
setInterval(updateDateTime,1000);
updateDateTime();

const ESP_IP = "http://10.228.178.72";


function sendEmergency(lane){

    const statusEl = document.getElementById("status");
    const button = document.getElementById("btn"+lane);

    statusEl.innerHTML = "Sending Emergency Signal...";
    statusEl.style.color = "#f59e0b";


    disableAllButtons(true);

    fetch(`${ESP_IP}/emergency?lane=${lane}`)
    .then(response => response.text())
    .then(data => {

  
        statusEl.innerHTML =
        "Emergency Activated for Lane " + (lane+1);
        statusEl.style.color = "#dc2626";

        button.innerText = "Active";
        button.classList.remove("red");
        button.classList.add("green");

        setTimeout(() => {
            endEmergency(lane);
        }, 6000);  

    })
    .catch(error => {
        statusEl.innerHTML = "ESP32 Not Connected";
        statusEl.style.color = "red";
        disableAllButtons(false);
    });
}

function endEmergency(lane){

    const statusEl = document.getElementById("status");
    const button = document.getElementById("btn"+lane);

    // Optional: call ESP32 to clear emergency
    fetch(`${ESP_IP}/clearEmergency`)
    .catch(()=>{});

    statusEl.innerHTML = "System Ready";
    statusEl.style.color = "#16a34a";

    button.innerText = "Activate";
    button.classList.remove("green");
    button.classList.add("red");

    disableAllButtons(false);
}

function disableAllButtons(state){
    for(let i=0;i<4;i++){
        document.getElementById("btn"+i).disabled = state;
    }
}

</script>

</body>
</html>
